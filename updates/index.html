<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Sign up for Critter Engine product updates on the public Critter Engine website."
    />

    <title>Updates | Critter Engine</title>

    <link rel="icon" href="../logo/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="../logo/favicon.png" />
    <link rel="apple-touch-icon" href="../logo/icon-192.png" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html" aria-label="Critter Engine home">
          <img class="brand-mark" src="../logo/logo.svg" alt="" />
          <span class="brand-name">Critter Engine</span>
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="primary-nav"
          data-menu-toggle
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="primary-nav" aria-label="Primary" data-site-nav>
          <a href="../index.html#why">Why Critter Engine</a>
          <a href="../index.html#mujoco">MuJoCo</a>
          <a href="../index.html#features">Features</a>
          <a href="../updates/index.html">Updates</a>
          <a href="../feedback/index.html">Send Feedback</a>
          <a href="../index.html#faq">FAQ</a>
        </nav>

        <a class="button button-primary header-cta" href="../updates/index.html">Sign Up</a>
      </div>
    </header>

    <main id="main">
      <section class="section form-page">
        <div class="container form-layout">
          <div class="form-copy">
            <p class="eyebrow">Critter Engine updates</p>
            <h1>Get product updates.</h1>
            <p class="lead">
              Sign up and receive updates about product and feature launches only. No spam.
            </p>
          </div>

          <form class="form-panel" data-updates-form novalidate>
            <div class="form-field">
              <label for="updates-email">Email</label>
              <input
                id="updates-email"
                name="email"
                type="email"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-field">
              <label for="updates-name">Name</label>
              <input id="updates-name" name="name" type="text" autocomplete="name" maxlength="100" />
            </div>

            <div class="honeypot" aria-hidden="true">
              <label for="updates-website">Website</label>
              <input id="updates-website" name="website" type="text" tabindex="-1" autocomplete="off" />
            </div>

            <button class="button button-primary" type="submit">Sign up for updates</button>
            <p class="form-status" data-updates-status role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <a class="footer-brand" href="../index.html" aria-label="Critter Engine home">
          <img class="footer-mark" src="../logo/logo.svg" alt="" />
          <span>Critter Engine</span>
        </a>
        <p class="footer-meta">
          <span>&copy; <span id="year"></span></span>
          <span class="dot" aria-hidden="true">&middot;</span>
          <a href="../updates/index.html">Updates</a>
          <span class="dot" aria-hidden="true">&middot;</span>
          <a href="../feedback/index.html">Send Feedback</a>
          <span class="dot" aria-hidden="true">&middot;</span>
          <a href="../legal/third-party-notices/">Third-Party Notices</a>
        </p>
      </div>
    </footer>

    <script src="../script.js" defer></script>
  </body>
</html>
